theme: jekyll-theme-primer

# Jekyll's Liquid parser chokes on curly-brace code samples inside our
# internal docs (the `usePopoverPosition` example in docs/COMPONENTS.md
# contains `{{ ...menuStyle, ... }}` which Liquid reads as an unterminated
# variable tag). Those files are AI-context docs for Claude, not site
# content — exclude them from the GitHub Pages build.
exclude:
  - docs
  - tasks
  - scripts
  - src
  - public
  - node_modules
  - dist
  - dev-dist
  - CLAUDE.md
  - ATTRIBUTIONS.md
  - package.json
  - package-lock.json
  - pnpm-lock.yaml
  - tsconfig.json
  - vite.config.ts
  - index.html
